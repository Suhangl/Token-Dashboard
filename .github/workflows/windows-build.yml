name: Windows Build & Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build widget
        shell: powershell
        run: |
          powershell -ExecutionPolicy Bypass -File .\build.ps1

      - name: Build and run tests
        shell: powershell
        run: |
          powershell -ExecutionPolicy Bypass -File .\test.ps1

      - name: Check whitespace
        shell: powershell
        run: |
          if ("${{ github.event_name }}" -eq "pull_request") {
              $base = "${{ github.event.pull_request.base.sha }}"
              $head = "${{ github.event.pull_request.head.sha }}"

              Write-Host "Checking whitespace from $base to $head"
              git diff --check "$base...$head"
          }
          else {
              $before = "${{ github.event.before }}"
              $head = "${{ github.sha }}"

              if ([string]::IsNullOrWhiteSpace($before) -or $before -match '^0+$') {
                  Write-Host "Checking first commit $head"
                  git show --check --format= "$head"
              }
              else {
                  Write-Host "Checking whitespace from $before to $head"
                  git diff --check "$before..$head"
              }
          }

          if ($LASTEXITCODE -ne 0) {
              throw "Whitespace check failed"
          }

          Write-Host "No whitespace issues"
